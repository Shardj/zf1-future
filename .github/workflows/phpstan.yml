name: PHPStan

on: [push, pull_request]

jobs:
  phpstan:
    name: Analyze
    runs-on: [ubuntu-latest]

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --ignore-platform-req=ext-*

      - name: Restore result cache
        uses: actions/cache/restore@v4
        with:
          path: .phpstan.cache
          key: phpstan-result-cache-${{ github.run_id }}
          restore-keys: |
            phpstan-result-cache-

      - name: Generate baseline from upstream Shardj
        run: |
          # Fetch upstream and generate baseline from their code
          # This means only errors WE introduced will fail — upstream errors are baselined
          git remote add shardj https://github.com/Shardj/zf1-future.git 2>/dev/null || true
          git fetch shardj master --depth=1

          # Save our branch, checkout upstream, generate baseline
          CURRENT_BRANCH=$(git rev-parse HEAD)
          git checkout shardj/master -- library/ 2>/dev/null || true
          XDEBUG_MODE=off php bin/phpstan.phar analyze --configuration .phpstan.dist.neon -b .phpstan.dist.baseline.neon || true

          # Restore our code
          git checkout "$CURRENT_BRANCH" -- library/ 2>/dev/null || git checkout -- library/

      - name: PHPStan Static Analysis
        run: XDEBUG_MODE=off php bin/phpstan.phar analyze --configuration .phpstan.dist.neon

      - name: Save result cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .phpstan.cache
          key: phpstan-result-cache-${{ github.run_id }}
